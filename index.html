<script>
let answers=[];
// ✅ KALENDERDATEN GLOBAL SPEICHERN
let calendarData = null;

// --- Funktion für Schreibmaschinen-Effekt ---
function animateText(elementId, text, delay = 15, callback) {
    const element = document.getElementById(elementId);
    if (!element) {
        if (callback) callback();
        return;
    }
    element.textContent = ''; // Sicherstellen, dass das Element leer ist
    let i = 0;
    const interval = setInterval(() => {
        element.textContent += text.charAt(i);
        i++;
        if (i >= text.length) {
            clearInterval(interval);
            if (callback) callback(); // Callback nach Abschluss der Animation aufrufen
        }
    }, delay);
}

// --- Sanftere Übergänge für Seitenwechsel ---
function show(a,b){
    const elementA = document.getElementById(a);
    const elementB = document.getElementById(b);

    // Füge Fade-Out-Klasse hinzu
    elementA.classList.add('fade-out');
    elementA.classList.remove('visible');

    // Warte auf das Ende der Transition, bevor das nächste Element angezeigt wird
    elementA.addEventListener('transitionend', function handler() {
        elementA.classList.add('hidden');
        elementA.classList.remove('fade-out');
        elementA.removeEventListener('transitionend', handler); // Event-Listener entfernen

        // Nächstes Element anzeigen und sichtbar machen (Fade-In)
        elementB.classList.remove('hidden');
        // Kurze Verzögerung, um den Fade-In-Effekt zu ermöglichen
        setTimeout(() => {
            elementB.classList.add('visible');
        }, 50);
    }, { once: true });
}

];
const analysisTexts = [
    'Nadine-Kompatibilität wird berechnet... ❤️\n\n✅ Sehr sympathisch 😊\n\n✅ Hat ein wunderschönes Lächeln ❤️\n\n✅ Hat bereits Wanderungen und Spaziergänge erfolgreich überstanden 🥾🌳\n\n✅ Hat bei Eis, Billard und Kino einen ausgezeichneten Eindruck hinterlassen 🍦🎱🍿\n\nErgebnis:\n\nNächstes Date dringend empfohlen ❤️'
];

    "Fehlgeschlagene Treffen: 0<br><br><b>Erfolgsquote: 100 %</b><br>Weitere Treffen dringend empfohlen ❤️"

function showIntroAnimation() {
    const introTextElement = document.getElementById('intro-text');
    const introNextBtn = document.getElementById('introNextBtn');

    let textIndex = 0;
    function animateNextIntroLine() {

            animateText('intro-text', introTexts[textIndex], 15, () => {
                textIndex++;
                animateNextIntroLine(); // Nächste Zeile animieren
            });

            introNextBtn.classList.remove('hidden');

function showAnalysis(){

function startQuestions(){show('questionsIntro','questions');renderQ()}

const qs=[
    ['🏆 Welches Date war bisher dein Favorit?',['Eis essen 🍦','Billard 🎱','Wandern 🥾','Spaziergang 🌳','Kino 🍿']],
    ['⏰ Wie schnell vergeht die Zeit bei unseren Treffen für dich gefühlt?',['Normal 😊','Ziemlich schnell ❤️','Viel zu schnell 🥰','Ich wundere mich jedes Mal, wie spät es plötzlich ist 🙈']],
    ['💭 Florian in einem Wort?','text'],
    ['📋 Wie würdest du unsere bisherigen Treffen beschreiben?',['Freundschaftlich 😊','Sehr schöne Dates ❤️','Ich fühle mich richtig wohl 😊❤️','Ich kann nicht genug davon bekommen 🥰❤️']],
    ['💌 Was schätzt du an Florian am meisten?','text'],
    ['💭 Worauf freust du dich bei unseren Treffen am meisten?',['Die Gespräche 😊','Die gemeinsame Zeit ❤️','Die Aktivitäten 🥾','Alles zusammen 🥰']],

let qi=0;
function renderQ(){
    const questionElement = document.getElementById('q');

    // --- Klassen zurücksetzen, um Animationen korrekt auszuführen ---
    questionElement.classList.remove('fade-in', 'fade-out', 'visible');
    questionElement.innerHTML = ''; // Vorherigen Inhalt leeren

    let d=qs[qi];
    if(d[1]==='text'){
        questionElement.innerHTML='<h3>'+d[0]+'</h3><textarea class="field" id="t" rows="4"></textarea><button class="btn" onclick="nextQ()">Weiter</button>';
    } else {
        let h='<h3>'+d[0]+'</h3>';
        d[1].forEach((v, index) => {
            // --- Dynamische Aktivitätsvorschläge (einfach) ---
            let optionClass = '';
            // Wenn es die Lieblingsaktivitäten-Frage ist und die Antwort passt, hebe die Option hervor
            if (qs[qi][0].includes('Welches Date war bisher dein Favorit?') && answers.length > 0 && answers[0] === v) {
                optionClass = 'highlight-activity'; // CSS-Klasse für Hervorhebung
            }
            h+='<div class="row"><label><input type="radio" name="r" value="'+v+'" class="'+optionClass+'"> '+v+'</label></div>';
        });
        h+='<button class="btn" onclick="nextQ()">Weiter</button>';
        questionElement.innerHTML=h;
    }

    // --- Visuelle Fortschrittsanzeige für Fragen ---
    const progressBarContainer = document.getElementById('progress');
    const progressWidth = ((qi + 1) / qs.length) * 100;
    progressBarContainer.innerHTML = `
        <div class="progress-bar-container">
            <div class="progress-bar" style="width: ${progressWidth}%;"></div>

    // Kurze Verzögerung, um sicherzustellen, dass der Inhalt gerendert ist
    setTimeout(() => {
        questionElement.classList.add('fade-in');
        questionElement.classList.add('visible');
    }, 50);
}
function nextQ(){
    let d=qs[qi];
    if(d[1]==='text'){
        answers.push(document.getElementById('t').value.trim() || '-');
    } else {
        let r=document.querySelector('input[name=r]:checked');
        if(!r) {
            alert('Bitte wähle eine Option! ❤️');
            return;
        }
        answers.push(r.value);
    }
    qi++;
    // Frage-Elemente für den Fade-Out vorbereiten
    const questionElement = document.getElementById('q');
    questionElement.classList.remove('visible');
    questionElement.classList.add('fade-out');

    if(qi<qs.length) {
        // Warte auf das Ende der Transition, bevor die nächste Frage geladen wird
        questionElement.addEventListener('transitionend', function handler() {
            renderQ();
            questionElement.removeEventListener('transitionend', handler);
        }, { once: true });
    }
    else {
        // Warte auf das Ende der Transition, bevor zum Planungsbereich gewechselt wird
        questionElement.addEventListener('transitionend', function handler() {
            show('questions','plan');
            questionElement.removeEventListener('transitionend', handler);
        }, { once: true });
    }
}

// --- Funktion zur Steuerung des "Etwas anderes..." Feldes für Aktivitäten ---
function toggleOtherActivityField(){
    const otherActivityInput = document.getElementById('otherActivity');
    const activitySelect = document.getElementById('act'); // Referenz zum Aktivitäts-Select

    if(activitySelect.value === '✏️ Etwas anderes ...'){
        otherActivityInput.classList.remove('hidden');
        otherActivityInput.setAttribute('required', '');
    } else {
        otherActivityInput.classList.add('hidden');
        otherActivityInput.removeAttribute('required');
    }
}

// --- Funktion zur Erstellung der ICS-Datei ---
function createIcsContent(
    dateStr,
    timeStr,
    activity,
    durationHours // Neue Parameter für die Dauer
){

    const start =
        dateStr.replace(/-/g,'') +
        'T' +
        timeStr.replace(/:/g,'') +
        '00';

    // Dauer berechnen
    let duration = parseInt(durationHours); // Dauer in Stunden

    // "Open End" behandeln: Setze eine sehr lange Dauer, z.B. 24 Stunden
    if (duration === 99) { // 99 ist der Wert für "Open End"
        duration = 24; // Setze auf 24 Stunden als Standard für Open End
    }

    // Endzeit berechnen
    const endDate = new Date(dateStr + 'T' + timeStr);
    endDate.setHours(endDate.getHours() + duration);

    const end =
        endDate.getFullYear() +
        String(endDate.getMonth()+1).padStart(2,'0') + // Monate sind 0-basiert, daher +1
        String(endDate.getDate()).padStart(2,'0') +
        'T' +
        String(endDate.getHours()).padStart(2,'0') +
        String(endDate.getMinutes()).padStart(2,'0') +
        '00';

    // Vereinfachte ICS-Struktur für maximale Kompatibilität
    return `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:${activity}
DTSTART:${start}
DTEND:${end}
DESCRIPTION:Date mit Florian ❤️
END:VEVENT
END:VCALENDAR`;
}

// --- Funktion zum Herunterladen einer Datei (wird von saveCalendar() verwendet) ---
function downloadFile(filename, content, mimeType = 'text/plain') {
    console.log("downloadFile called with:", filename, mimeType); // Debugging
    try {
        const blob = new Blob([content], { type: mimeType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        console.log("Attempting to click download link..."); // Debugging
        a.click();
        console.log("Download link clicked."); // Debugging
        setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            console.log("Cleanup done."); // Debugging
        }, 100);
    } catch (e) {
        console.error("Error in downloadFile:", e); // Debugging
        alert("Fehler beim Erstellen des Downloads. Bitte versuchen Sie es erneut.");
    }
}

// --- ✅ SAVECALENDAR() ERSETZEN ---
function saveCalendar(){

    if(!calendarData) {
        console.error("calendarData is null, cannot save calendar.");
        alert("Fehler: Kalenderdaten sind nicht verfügbar.");
        return;
    }

    const ics =
        createIcsContent(
            calendarData.date,
            calendarData.time,
            calendarData.activity,
            calendarData.duration // Dauer übergeben
        );

    const blob =
        new Blob(
            [ics],
            {
                type:'text/calendar'
            }
        );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement('a');

    a.href = url;
    a.download =
        'DateMitFlorian.ics';

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);

    setTimeout(()=>{
        URL.revokeObjectURL(url);
    },1000);
}

    resultHtml += `<div id="cert" class="cert-text"></div>`; // Zertifikatstext wird hier eingefügt

    resultHtml += `<div id="transfer" class="left"></div>`; // Platzhalter für die simulierte Übertragung

    out.innerHTML = resultHtml;

    // --- Zertifikat mit Schreibmaschinen-Effekt ---
    const certTextElement = document.getElementById('cert');
    certTextElement.textContent = ''; // Sicherstellen, dass es leer ist, bevor die Animation beginnt
    let certAnimationInterval = setInterval(()=>{
        certTextElement.textContent = ct.slice(0, certTextElement.textContent.length + 1);
        if (certTextElement.textContent.length >= ct.length) {
            clearInterval(certAnimationInterval);
            // Sobald das Zertifikat fertig geschrieben ist, starten wir die Datenübertragung
            startTransferSimulation();
        }
    }, 15); // Geschwindigkeit der Schreibmaschine

    // --- Funktion zur Simulation der Datenübertragung und Anzeige der Buttons ---
    function startTransferSimulation() {
        let transferText = `📡 Datenübertragung ausstehend...\nVerbinde mit Florian...\n✅ Überprüfe Schmetterlings-Analyse...\n✅ Verpacke Antworten...\n✅ Übertragung bereit ❤️\n\n⚠️ Letzter Schritt erforderlich:\nDie Ergebnisse wurden vorbereitet,\naber noch nicht an Florian gesendet.\nOhne den nächsten Schritt\nbekommt er deine Antworten leider nicht 😇\n👇 Bitte jetzt übertragen 👇`;
        let j = 0;
        const transferElement = document.getElementById('transfer');
        transferElement.textContent = ''; // Sicherstellen, dass das Element leer ist

        const transferWriter = setInterval(() => {
            transferElement.textContent = transferText.slice(0, ++j);
            if (j >= transferText.length) {
                clearInterval(transferWriter);

                // WhatsApp Button (jetzt grün und zentriert dank .wa Klasse)
                const waLink = `https://api.whatsapp.com/send?phone=4915758309186&text=${encodeURIComponent(msg)}`;
                transferElement.innerHTML += `<br><br><a class="wa" href="${waLink}" target="_blank">📲 Antworten & Date an Florian senden</a>`;

                // Kalender Button
                transferElement.innerHTML += `
<br><br>

<button
class="cal"
onclick="saveCalendar()">
📆 Unser nächstes Date im Kalender speichern ❤️
</button>

<p style="font-size:14px;color:#666;margin-top:8px;">
Damit du unser Date nicht vergisst 🥰
</p>
`;
            }
        }, 15);
    }
}
