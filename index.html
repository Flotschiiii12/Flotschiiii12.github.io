<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für Nadine ❤️</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:linear-gradient(
        135deg,
        #ff5f8a,
        #ff7eb3,
        #ffc2d1
    );
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;
}

.card{
    width:100%;
    max-width:560px;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(10px);
    border-radius:30px;
    padding:30px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.15);
    z-index:2;
}

.hidden{
    display:none;
}

h1{
    color:#ff2f6d;
}

button{
    border:none;
    border-radius:15px;
    padding:14px 22px;
    font-size:16px;
    cursor:pointer;
    margin:5px;
}

.primary{
    background:#ff2f6d;
    color:white;
}

.secondary{
    background:#ececec;
}

input,
select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid #ddd;
}

.linkbtn{
    display:block;
    text-decoration:none;
    color:white;
    font-weight:bold;
    padding:14px;
    border-radius:12px;
    margin-top:12px;
}

.calendar{
    background:#4285F4;
}

.whatsapp{
    background:#25D366;
}

.cert{
    margin-top:20px;
    border-top:1px solid #ddd;
    padding-top:20px;
    color:#666;
}

.heart{
    position:fixed;
    opacity:.2;
    pointer-events:none;
    animation:float linear infinite;
    z-index:1;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120px);
    }
}

</style>
</head>

<body>

<div class="card">

<div id="welcome">

<h1>❤️Nadine❤️</h1>

<p>Hi 😊</p>

<p>
Ich möchte dich
<br>
etwas fragen... ❤️
</p>

<button class="primary" onclick="showQuestion()">
Weiter ❤️
</button>

</div>

<div id="question" class="hidden">

<h2>
Möchtest du mit mir auf ein Date gehen? 🥺
</h2>

<button
class="primary"
onclick="showForm()">
Ja 😍
</button>

<button
id="noBtn"
class="secondary"
onclick="changeNoButton()">
Nein 🙈
</button>

</div>

<div id="form" class="hidden">

<h2>🥰 Das freut mich!</h2>

<input type="date" id="date">

<input type="time" id="time">

<select id="activity" onchange="toggleCustom()">

<option value="Café ☕">Café ☕</option>
<option value="Kino 🍿">Kino 🍿</option>
<option value="Essen gehen 🍝">Essen gehen 🍝</option>
<option value="Spaziergang 🌳">Spaziergang 🌳</option>
<option value="Dart bei dir 🎯">Dart bei dir 🎯</option>
<option value="Baden 🏊">Baden 🏊</option>
<option value="Gemeinsam Feiern 🎉">Gemeinsam Feiern 🎉</option>
<option value="custom">✏️ Eigene Idee</option>

</select>

<input
id="customActivity"
class="hidden"
type="text"
placeholder="Deine Idee ❤️">

<button
class="primary"
onclick="confirmDate()">
Date bestätigen ❤️
</button>

</div>

<div id="result" class="hidden">

<h2>✅ DATE BESTÄTIGT ❤️</h2>

<div id="output"></div>

</div>

</div>

<script>

const noTexts = [
"Nein 🙈",
"Sicher? 🥺",
"Wirklich? 😢",
"Ganz sicher? 😭",
"Die Statistik empfiehlt Ja 📊",
"Florian wäre traurig 💔",
"Vielleicht doch Ja? 😇"
];

let noIndex = 0;

function showQuestion(){
    welcome.classList.add("hidden");
    question.classList.remove("hidden");
}

function showForm(){
    question.classList.add("hidden");
    form.classList.remove("hidden");
}

function changeNoButton(){

    noIndex++;

    if(noIndex < noTexts.length){
        noBtn.innerText = noTexts[noIndex];
    }else{
        noBtn.style.display = "none";
    }
}

function toggleCustom(){

    if(activity.value === "custom"){
        customActivity.classList.remove("hidden");
    }else{
        customActivity.classList.add("hidden");
    }
}

function confirmDate(){

    let selectedActivity =
        activity.value;

    if(selectedActivity === "custom"){

        selectedActivity =
            customActivity.value.trim();

        if(!selectedActivity){
            alert("Bitte eine Idee eingeben ❤️");
            return;
        }
    }

    if(!date.value || !time.value){
        alert("Bitte Datum und Uhrzeit auswählen ❤️");
        return;
    }

    const start =
        new Date(date.value + "T" + time.value);

    const end =
        new Date(start.getTime() + 7200000);

    const formatICS = (d) =>
        d.toISOString()
         .replace(/[-:]/g,"")
         .split(".")[0] + "Z";

    const ics =
`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:Date mit Florian ❤️
DESCRIPTION:${selectedActivity}
DTSTART:${formatICS(start)}
DTEND:${formatICS(end)}
END:VEVENT
END:VCALENDAR`;

    const blob =
        new Blob(
            [ics],
            {type:"text/calendar"}
        );

    const calendarUrl =
        URL.createObjectURL(blob);

    const whatsappText =
`Hey Florian ❤️

Ich habe JA gesagt! 🥰

📅 ${date.value}
⏰ ${time.value}
✨ ${selectedActivity}

Ich freue mich schon ❤️`;

    const whatsappUrl =
        "https://api.whatsapp.com/send?phone=4915758309186&text=" +
        encodeURIComponent(whatsappText);

    form.classList.add("hidden");
    result.classList.remove("hidden");

    output.innerHTML =

        "👩 Nadine<br>" +
        "🧑 Florian<br><br>" +

        "📅 " + date.value + "<br>" +
        "⏰ " + time.value + "<br>" +
        "✨ " + selectedActivity +

        "<br><br>" +

        "💌 Ich freue mich ehrlich gesagt jetzt schon auf unser Date ❤️" +

        '<a class="linkbtn calendar" href="' +
        calendarUrl +
        '" download="DateMitFlorian.ics">📅 Kalender hinzufügen</a>' +

        '<a class="linkbtn whatsapp" href="' +
        whatsappUrl +
        '">📲 Antwort per WhatsApp senden</a>' +

        '<div class="cert">' +

        '──────────────<br><br>' +

        'DATE-ZERTIFIKAT ❤️<br><br>' +

        'Nadine ✅<br>' +
        'Florian ✅<br><br>' +

        'Status: Date erfolgreich geplant 🥰' +

        '</div>';
}

for(let i=0;i<25;i++){

    let heart =
        document.createElement("div");

    heart.className =
        "heart";

    heart.innerHTML =
        "❤️";

    heart.style.left =
        Math.random()*100 + "%";

    heart.style.fontSize =
        (16 + Math.random()*20) + "px";

    heart.style.animationDuration =
        (5 + Math.random()*8) + "s";

    document.body.appendChild(heart);
}

</script>

</body>
</html>
