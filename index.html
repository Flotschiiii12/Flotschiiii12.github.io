<!DOCTYPE html><html lang='de'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>V7.1</title><style>html,body{max-width:100%;overflow-x:hidden} body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ff5f8a,#ff7eb3,#ffc2d1);overflow-x:hidden;overflow-y:auto}.row label{display:flex;align-items:flex-start;gap:10px;text-align:left;width:100%}.row input{flex-shrink:0;width:auto}.row span{flex:1;white-space:normal;word-break:break-word;overflow-wrap:anywhere;display:block;max-width:100%}.card{overflow:hidden}.card{max-width:760px;margin:20px auto;background:#fff;padding:25px;border-radius:25px}.hidden{display:none}.btn{background:#ff2f6d;color:#fff;border:none;padding:12px 18px;border-radius:12px}.row label{display:block;margin:10px 0}.wa,.cal{display:block;margin:10px 0;padding:14px;color:#fff;text-decoration:none;border-radius:12px}.wa{background:#25D366}.cal{background:#4285f4}</style></head><body><div class='card'><div id='s1'><h1>вқӨпёҸ Nadine вқӨпёҸ</h1><p>Hi Nadine рҹҳҠ</p><p>Ich mГ¶chte dich etwas fragen вқӨпёҸ</p><button class='btn' onclick='next(1,2)'>Weiter вқӨпёҸ</button></div><div id='s2' class='hidden'><h2>MГ¶chtest du mit mir unser nГӨchstes Date planen? рҹҘә</h2><button class='btn' onclick='showAnalysis()'>Ja рҹҳҚ</button><button id='noBtn' class='btn' style='background:#ddd;color:#333;margin-left:8px' onclick='noClick()'>Nein рҹҷҲ</button></div><div id='ana' class='hidden'><pre id='txt'></pre><button id='anaBtn' class='btn hidden' onclick='startQuestions()'>Weiter вқӨпёҸ</button></div><div id='qs' class='hidden'><div id='prog'></div><div id='q'></div></div><div id='plan' class='hidden'><h2>Date planen вқӨпёҸ</h2><input id='date' type='date'><input id='time' type='time'><select id='act' onchange='toggleOther()'><option>рҹҚҰ Eis essen</option><option>рҹҚҝ Kino</option><option>рҹҚқ Essen gehen</option><option>рҹҢі Spaziergang</option><option>рҹҘҫ Wandern</option><option>рҹҺҜ Dart bei dir</option><option>рҹҸҠ Baden</option><option>рҹҺү Gemeinsam Feiern</option><option value='other'>вңҸпёҸ Etwas anderes ...</option></select><input id='other' class='hidden' placeholder='Was hast du im Kopf? вқӨпёҸ'><button class='btn' onclick='finish()'>Date bestГӨtigen вқӨпёҸ</button></div><div id='res' class='hidden'><div id='out'></div></div></div><script>function next(a,b){document.getElementById('s'+a).classList.add('hidden');document.getElementById('s'+b).classList.remove('hidden')}function showAnalysis(){s2.classList.add('hidden');ana.classList.remove('hidden');let t='Systemanalyse lГӨuft...\n\nвң… Sehr sympathisch рҹҳҠ\n\nвң… Hat ein wunderschГ¶nes LГӨcheln вқӨпёҸ\n\nвң… Hat bereits Wanderungen und SpaziergГӨnge erfolgreich Гјberstanden рҹҘҫрҹҢі\n\nвң… Hat bei Eis, Billard und Kino einen ausgezeichneten Eindruck hinterlassen рҹҚҰрҹҺұрҹҚҝ\n\nErgebnis:\n\nNГӨchstes Date dringend empfohlen вқӨпёҸ';let i=0,v=setInterval(()=>{txt.textContent=t.slice(0,++i);if(i>=t.length){clearInterval(v);anaBtn.classList.remove('hidden')}},15)}const qsData=[['рҹҸҶ Welches Date war bisher dein Favorit?',['Eis essen рҹҚҰ','Billard рҹҺұ','Wandern рҹҘҫ','Spaziergang рҹҢі','Kino рҹҚҝ']],['вҸ° Wie schnell vergeht die Zeit bei unseren Treffen fГјr dich gefГјhlt?',['Normal рҹҳҠ','Ziemlich schnell вқӨпёҸ','Viel zu schnell рҹҘ°','Wie spГӨt plГ¶tzlich? рҹҷҲ']],['рҹ’ӯ Florian in einem Wort?','text'],['рҹ“Ӣ Wie wГјrdest du unsere bisherigen Treffen beschreiben?',['Freundschaftlich рҹҳҠ','Sehr schГ¶ne Dates вқӨпёҸ','Irgendwo dazwischen рҹҷҲ','Noch nicht sicher рҹҳҮ']],['рҹ’Ң Was schГӨtzt du an Florian am meisten?','text'],['рҹ’Ң Kleine Gegenanalyse',['Florian ist sehr sympathisch рҹҳҠ','Ich freue mich immer auf unsere Treffen вқӨпёҸ','Ich denke manchmal an unser nГӨchstes Date рҹҘ°','Florian verursacht gelegentlich Schmetterlinge im Bauch рҹҰӢ','Keine Angabe рҹҳҮ']]];let qi=0,ans=[];function startQuestions(){ana.classList.add('hidden');qs.classList.remove('hidden');render()}function render(){prog.innerHTML='Frage '+(qi+1)+' von 6 вқӨпёҸ';let d=qsData[qi];if(d[1]==='text'){q.innerHTML='<h3>'+d[0]+'</h3><textarea id=t></textarea><button class=btn onclick=nextQ()>Weiter</button>'}else{let h='<h3>'+d[0]+'</h3>';d[1].forEach(v=>h+='<div class=row><label><input type=radio name=r value="'+v+'"><span>'+v+'</span></label></div>');h+='<button class=btn onclick=nextQ()>Weiter</button>';q.innerHTML=h}}function nextQ(){let d=qsData[qi];if(d[1]==='text')ans.push(t.value||'-');else{let r=document.querySelector('input[name=r]:checked');if(!r)return;ans.push(r.value)}qi++;if(qi<6)render();else{qs.classList.add('hidden');plan.classList.remove('hidden')}}function toggleOther(){other.classList.toggle('hidden',act.value!=='other')}function finish(){let activity=act.value==='other'?other.value:act.value;let start=new Date(date.value+'T'+time.value);let end=new Date(start.getTime()+7200000);let fmt=d=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';let ics=`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:Date mit Florian вқӨпёҸ\nDTSTART:${fmt(start)}\nDTEND:${fmt(end)}\nDESCRIPTION:${activity}\nEND:VEVENT\nEND:VCALENDAR`;let cal=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));let wa='https://api.whatsapp.com/send?phone=4915758309186&text='+encodeURIComponent('Hey Florian вқӨпёҸ\n\nIch habe JA gesagt! рҹҘ°\n\nрҹ“… Unser Date: '+date.value+'\nвҸ° '+time.value+'\nвңЁ '+activity+'\n\nUnd hier noch meine Antworten рҹҳүвқӨпёҸ');plan.classList.add('hidden');res.classList.remove('hidden');out.innerHTML='<h2>вң… DATE BESTГ„TIGT вқӨпёҸ</h2><a class="cal" download="DateMitFlorian.ics" href="'+cal+'">рҹ“… Kalender hinzufГјgen</a><div id=cert></div><div id=transfer></div>';let certTxt='рҹҸҶ OFFIZIELLES DATE-ZERTIFIKAT\n\nNadine вң…\nFlorian вң…\nDatum вң…\nUhrzeit вң…\nAktivitГӨt вң…\n\nNГӨchstes Date bestГӨtigt вқӨпёҸ';let i=0;let c=setInterval(()=>{cert.textContent=certTxt.slice(0,++i);if(i>=certTxt.length){clearInterval(c);transfer.innerHTML='<br>рҹ“Ў DatenГјbertragung ausstehend...<br>вң… Verbinde mit Florian...<br>вң… ГңberprГјfe Schmetterlings-Analyse...<br>вң… Verpacke Antworten...<br>вң… Гңbertragung bereit вқӨпёҸ<br><br><a class="wa" href="'+wa+'">рҹ“І Antworten & Date an Florian senden</a>'}},10)}const noTexts=["Nein рҹҷҲ","Sicher? рҹҘә","Wirklich? рҹҳў","Ganz sicher? рҹҳӯ","Die Statistik empfiehlt Ja рҹ“Ҡ","Florian wГӨre traurig рҹ’”","Vielleicht doch Ja? рҹҳҮ"];let noI=0;function noClick(){noI++;if(noI<noTexts.length)document.getElementById("noBtn").innerText=noTexts[noI];else document.getElementById("noBtn").style.display="none";} </script></body></html>
