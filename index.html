<!DOCTYPE html><html lang='de'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>V7.5</title><style>
html,body{margin:0;max-width:100%;overflow-x:hidden;font-family:Arial,sans-serif;background:linear-gradient(135deg,#ff5f8a,#ff7eb3,#ffc2d1)}
.card{max-width:650px;margin:20px auto;background:#fff;padding:25px;border-radius:25px;box-sizing:border-box}
.hidden{display:none}.btn{background:#ff2f6d;color:#fff;border:none;padding:12px 18px;border-radius:12px;cursor:pointer}
input,select,textarea{width:100%;padding:12px;margin-top:10px;box-sizing:border-box;border:1px solid #ddd;border-radius:12px}
.row{margin:12px 0}.row label{display:block;text-align:left;line-height:1.5}
.wa,.cal{display:block;margin:10px 0;padding:14px;color:#fff;text-decoration:none;border-radius:12px}.wa{background:#25D366}.cal{background:#4285f4}
#txt,#cert{white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word}
</style></head><body><div class='card'>
<div id='s1'><h1>❤️ Nadine ❤️</h1><p>Hi Nadine 😊</p><p>Ich möchte dich etwas fragen ❤️</p><button class='btn' onclick='go(1,2)'>Weiter ❤️</button></div>
<div id='s2' class='hidden'><h2>Möchtest du mit mir unser nächstes Date planen? 🥺</h2><button class='btn' onclick='showAnalysis()'>Ja 😍</button><button id='noBtn' class='btn' style='background:#ddd;color:#333'>Nein 🙈</button></div>
<div id='ana' class='hidden'><div id='txt'></div><br><button id='anaBtn' class='btn hidden' onclick='startQuestions()'>Weiter ❤️</button></div>
<div id='qs' class='hidden'><div id='prog'></div><div id='q'></div></div>
<div id='plan' class='hidden'><h2>Date planen ❤️</h2><input id='date' type='date'><input id='time' type='time'><select id='act' onchange='toggleOther()'><option>🍦 Eis essen</option><option>🍿 Kino</option><option>🍝 Essen gehen</option><option>🌳 Spaziergang</option><option>🥾 Wandern</option><option>🎯 Dart bei dir</option><option>🏊 Baden</option><option>🎉 Gemeinsam Feiern</option><option value='other'>✏️ Etwas anderes ...</option></select><input id='other' class='hidden' placeholder='Was hast du im Kopf? ❤️'><button class='btn' onclick='finish()'>Date bestätigen ❤️</button></div>
<div id='res' class='hidden'><div id='out'></div></div></div>
<script>
function go(a,b){document.getElementById('s'+a).classList.add('hidden');document.getElementById('s'+b).classList.remove('hidden')}
const noTexts=['Nein 🙈','Sicher? 🥺','Wirklich? 😢','Ganz sicher? 😭','Die Statistik empfiehlt Ja 📊','Florian wäre traurig 💔','Vielleicht doch Ja? 😇'];let ni=0;noBtn.onclick=function(){ni++;if(ni<noTexts.length)this.innerText=noTexts[ni];else this.style.display='none'};
function showAnalysis(){s2.classList.add('hidden');ana.classList.remove('hidden');let t=`Systemanalyse läuft...

✅ Sehr sympathisch 😊

✅ Hat ein wunderschönes Lächeln ❤️

✅ Hat bereits Wanderungen und Spaziergänge erfolgreich überstanden 🥾🌳

✅ Hat bei Eis, Billard und Kino einen ausgezeichneten Eindruck hinterlassen 🍦🎱🍿

Ergebnis:

Nächstes Date dringend empfohlen ❤️`;let i=0;let v=setInterval(()=>{txt.textContent=t.slice(0,++i);if(i>=t.length){clearInterval(v);anaBtn.classList.remove('hidden')}},15)}
const qsData=[['🏆 Welches Date war bisher dein Favorit?',['Eis essen 🍦','Billard 🎱','Wandern 🥾','Spaziergang 🌳','Kino 🍿']],['⏰ Wie schnell vergeht die Zeit bei unseren Treffen für dich gefühlt?',['Normal 😊','Ziemlich schnell ❤️','Viel zu schnell 🥰','Ich wundere mich jedes Mal, wie spät es plötzlich ist 🙈']],['💭 Florian in einem Wort?','text'],['📋 Wie würdest du unsere bisherigen Treffen beschreiben?',['Freundschaftlich 😊','Sehr schöne Dates ❤️','Irgendwo dazwischen 🙈','Noch nicht sicher 😇']],['💌 Was schätzt du an Florian am meisten?','text'],['💌 Kleine Gegenanalyse',['Florian ist sehr sympathisch 😊','Ich freue mich immer auf unsere Treffen ❤️','Ich denke manchmal an unser nächstes Date 🥰','Florian verursacht gelegentlich Schmetterlinge im Bauch 🦋','Keine Angabe 😇']]];
let qi=0,ans=[];function startQuestions(){ana.classList.add('hidden');qs.classList.remove('hidden');render()}
function render(){prog.innerHTML='Frage '+(qi+1)+' von 6 ❤️';let d=qsData[qi];if(d[1]==='text'){q.innerHTML='<h3>'+d[0]+'</h3><textarea id=t></textarea><button class=btn onclick=nextQ()>Weiter</button>'}else{let h='<h3>'+d[0]+'</h3>';d[1].forEach(v=>h+='<div class=row><label><input type=radio name=r value="'+v+'"> '+v+'</label></div>');h+='<button class=btn onclick=nextQ()>Weiter</button>';q.innerHTML=h}}
function nextQ(){let d=qsData[qi];if(d[1]==='text')ans.push(document.getElementById('t').value||'-');else{let r=document.querySelector('input[name=r]:checked');if(!r)return;ans.push(r.value)}qi++;if(qi<6)render();else{qs.classList.add('hidden');plan.classList.remove('hidden')}}
function toggleOther(){other.classList.toggle('hidden',act.value!=='other')}
function finish(){let activity=act.value==='other'?other.value:act.value;let start=new Date(date.value+'T'+time.value);let end=new Date(start.getTime()+7200000);let fmt=d=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';let ics=`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:Date mit Florian ❤️\nDTSTART:${fmt(start)}\nDTEND:${fmt(end)}\nDESCRIPTION:${activity}\nEND:VEVENT\nEND:VCALENDAR`;let cal=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));let wa='https://api.whatsapp.com/send?phone=4915758309186&text='+encodeURIComponent('Hey Florian ❤️');res.classList.remove('hidden');plan.classList.add('hidden');out.innerHTML='<h2>✅ DATE BESTÄTIGT ❤️</h2><a class="cal" download="DateMitFlorian.ics" href="'+cal+'">📅 Kalender hinzufügen</a><div id="cert"></div><div id="transfer"></div>';let txt2='🏆 OFFIZIELLES DATE-ZERTIFIKAT\n\nNadine ✅\nFlorian ✅\nDatum ✅\nUhrzeit ✅\nAktivität ✅\n\nNächstes Date bestätigt ❤️';let i=0;let v=setInterval(()=>{cert.textContent=txt2.slice(0,++i);if(i>=txt2.length){clearInterval(v);transfer.innerHTML='<br>📡 Datenübertragung ausstehend...<br>✅ Verbinde mit Florian...<br>✅ Überprüfe Schmetterlings-Analyse...<br>✅ Verpacke Antworten...<br>✅ Übertragung bereit ❤️<br><br><a class="wa" href="'+wa+'">📲 Antworten & Date an Florian senden</a>'}},10)}
</script></body></html>
