<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:linear-gradient(
        135deg,
        #ff5f8a,
        #ff7eb3,
        #ffc2d1
    );
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;
}

.card{
    width:100%;
    max-width:560px;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(10px);
    border-radius:30px;
    padding:30px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.15);
    z-index:2;
}

.hidden{
    display:none;
}

h1{
    color:#ff2f6d;
}

button{
    border:none;
    border-radius:15px;
    padding:14px 22px;
    font-size:16px;
    cursor:pointer;
    margin:5px;
}

.primary{
    background:#ff2f6d;
    color:white;
}

.secondary{
    background:#ececec;
}

input,
select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid #ddd;
}
