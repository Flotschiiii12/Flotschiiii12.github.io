<!DOCTYPE html><html lang='de'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>V7.6</title><style>html,body{margin:0;overflow-x:hidden;font-family:Arial,sans-serif;background:linear-gradient(135deg,#ff5f8a,#ff7eb3,#ffc2d1)}.card{max-width:650px;margin:20px auto;background:#fff;border-radius:25px;padding:25px;box-sizing:border-box}.center{text-align:center}.left{text-align:left}.hidden{display:none}.btn{background:#ff2f6d;color:#fff;border:none;padding:12px 18px;border-radius:12px;cursor:pointer}.btnGray{background:#ddd;color:#333}.field{width:100%;padding:12px;margin-top:10px;box-sizing:border-box;border:1px solid #ddd;border-radius:12px}.row{margin:12px 0}.row label{display:block;text-align:left;line-height:1.5;word-break:break-word}.wa,.cal{display:block;margin:10px 0;padding:14px;border-radius:12px;text-decoration:none;color:#fff;text-align:center}.wa{background:#25D366}.cal{background:#4285f4}#txt,#cert,#transfer{white-space:pre-wrap;word-break:break-word}</style></head><body><div class='card'>
<div id='intro' class='center'><h1>❤️ Nadine ❤️</h1><p>Hi Nadine 😊</p><p>Ich möchte dich etwas fragen ❤️</p><button class='btn' onclick='show("intro","question")'>Weiter ❤️</button></div>
<div id='question' class='center hidden'><h2>Möchtest du mit mir unser nächstes Date planen? 🥺</h2><button class='btn' onclick='showAnalysis()'>Ja 😍</button> <button id='noBtn' class='btn btnGray'>Nein 🙈</button></div>
<div id='analysis' class='hidden left'><div id='txt'></div><br><button id='analysisBtn' class='btn hidden' onclick='showQuestionsIntro()'>Weiter ❤️</button></div>
<div id='questionsIntro' class='center hidden'><h2>Aber bevor wir weitermachen...</h2><p>hier ein paar Fragen 😊</p><button class='btn' onclick='startQuestions()'>Weiter ❤️</button></div>
<div id='questions' class='hidden left'><div id='progress'></div><div id='q'></div></div>
<div id='plan' class='hidden center'><h2>Date planen ❤️</h2><input class='field' id='date' type='date'><input class='field' id='time' type='time'><select class='field' id='act' onchange='toggleOther()'><option>🍦 Eis essen</option><option>🍿 Kino</option><option>🍝 Essen gehen</option><option>🌳 Spaziergang</option><option>🥾 Wandern</option><option>🎯 Dart bei dir</option><option>🏊 Baden</option><option>🎉 Gemeinsam Feiern</option><option value='other'>✏️ Etwas anderes ...</option></select><input class='field hidden' id='other' placeholder='Was hast du im Kopf? ❤️'><button class='btn' onclick='finish()'>Date bestätigen ❤️</button></div>
<div id='result' class='hidden center'><div id='out'></div></div>
</div><script>
function show(a,b){document.getElementById(a).classList.add('hidden');document.getElementById(b).classList.remove('hidden')}
const nt=['Nein 🙈','Sicher? 🥺','Wirklich? 😢','Ganz sicher? 😭','Die Statistik empfiehlt Ja 📊','Florian wäre traurig 💔','Vielleicht doch Ja? 😇'];let ni=0;noBtn.onclick=()=>{ni++;if(ni<nt.length)noBtn.innerText=nt[ni];else noBtn.style.display='none'};
function showAnalysis(){show('question','analysis');let t=`Systemanalyse läuft...\n\n✅ Sehr sympathisch 😊\n\n✅ Hat ein wunderschönes Lächeln ❤️\n\n✅ Hat bereits Wanderungen und Spaziergänge erfolgreich überstanden 🥾🌳\n\n✅ Hat bei Eis, Billard und Kino einen ausgezeichneten Eindruck hinterlassen 🍦🎱🍿\n\nErgebnis:\n\nNächstes Date dringend empfohlen ❤️`;let i=0;let v=setInterval(()=>{txt.textContent=t.slice(0,++i);if(i>=t.length){clearInterval(v);analysisBtn.classList.remove('hidden')}},15)}
function showQuestionsIntro(){show('analysis','questionsIntro')}
const qs=[['🏆 Welches Date war bisher dein Favorit?',['Eis essen 🍦','Billard 🎱','Wandern 🥾','Spaziergang 🌳','Kino 🍿']],['⏰ Wie schnell vergeht die Zeit bei unseren Treffen für dich gefühlt?',['Normal 😊','Ziemlich schnell ❤️','Viel zu schnell 🥰','Ich wundere mich jedes Mal, wie spät es plötzlich ist 🙈']],['💭 Florian in einem Wort?','text'],['📋 Wie würdest du unsere bisherigen Treffen beschreiben?',['Freundschaftlich 😊','Sehr schöne Dates ❤️','Irgendwo dazwischen 🙈','Noch nicht sicher 😇']],['💌 Was schätzt du an Florian am meisten?','text'],['💌 Kleine Gegenanalyse',['Florian ist sehr sympathisch 😊','Ich freue mich immer auf unsere Treffen ❤️','Ich denke manchmal an unser nächstes Date 🥰','Florian verursacht gelegentlich Schmetterlinge im Bauch 🦋','Keine Angabe 😇']]];let qi=0,ans=[];
function startQuestions(){show('questionsIntro','questions');renderQ()}
function renderQ(){progress.textContent='Frage '+(qi+1)+' von 6 ❤️';let d=qs[qi];if(d[1]==='text'){q.innerHTML='<h3>'+d[0]+'</h3><textarea class="field" id="t"></textarea><button class="btn" onclick="nextQ()">Weiter</button>';}else{let h='<h3>'+d[0]+'</h3>';d[1].forEach(v=>h+='<div class=row><label><input type=radio name=r value="'+v+'"> '+v+'</label></div>');h+='<button class="btn" onclick="nextQ()">Weiter</button>';q.innerHTML=h;}}
function nextQ(){let d=qs[qi];if(d[1]==='text')ans.push(document.getElementById('t').value||'-');else{let r=document.querySelector('input[name=r]:checked');if(!r)return;ans.push(r.value)}qi++;if(qi<6)renderQ();else show('questions','plan')}
function toggleOther(){other.classList.toggle('hidden',act.value!=='other')}
function finish(){let activity=act.value==='other'?other.value:act.value;let start=new Date(date.value+'T'+time.value);let end=new Date(start.getTime()+7200000);let fmt=d=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';let ics=`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:Date mit Florian ❤️\nDTSTART:${fmt(start)}\nDTEND:${fmt(end)}\nDESCRIPTION:${activity}\nEND:VEVENT\nEND:VCALENDAR`;let cal=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));let wa='https://api.whatsapp.com/send?phone=4915758309186&text='+encodeURIComponent('Hey Florian ❤️');show('plan','result');out.innerHTML='<h2>✅ DATE BESTÄTIGT ❤️</h2><div>💌 Kleine Nachricht<br><br>Ich freue mich wirklich immer, wenn wir Zeit miteinander verbringen 😊❤️<br><br>Du hast es geschafft, dass ich diese komplette Webseite für genau eine Person gebaut habe ❤️😇</div><a class="cal" download="DateMitFlorian.ics" href="'+cal+'">📅 Kalender hinzufügen</a><div id="cert" class="center"></div><div id="transfer" class="left"></div>';let ct='🏆 OFFIZIELLES DATE-ZERTIFIKAT\n\nNadine ✅\nFlorian ✅\n\nDatum ✅\nUhrzeit ✅\nAktivität ✅\n\nNächstes Date bestätigt ❤️';let i=0;let c=setInterval(()=>{cert.textContent=ct.slice(0,++i);if(i>=ct.length){clearInterval(c);transferSeq(wa)}},12)}
function transferSeq(wa){let steps=['📡 Datenübertragung ausstehend...','Verbinde mit Florian... ✅','Überprüfe Schmetterlings-Analyse... ✅','Verpacke Antworten... ✅','Übertragung bereit ❤️'];let i=0;let t=setInterval(()=>{transfer.textContent+=(i?"\n":"")+steps[i];i++;if(i>=steps.length){clearInterval(t);setTimeout(()=>{transfer.innerHTML=transfer.textContent+'\n\n⚠️ Letzter Schritt erforderlich\n\nDie Ergebnisse wurden vorbereitet, aber noch nicht an Florian gesendet.\nBitte jetzt übertragen ❤️\n\n<a class="wa" href="'+wa+'">📲 Antworten & Date an Florian senden</a>'},500)}},800)}
</script></body></html>
