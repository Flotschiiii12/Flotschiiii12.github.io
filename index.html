<!DOCTYPE html><html lang='de'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>V7.1</title><style>body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ff5f8a,#ff7eb3,#ffc2d1);overflow-x:hidden;overflow-y:auto}.row label{display:flex;align-items:flex-start;gap:10px;text-align:left}.row input{flex-shrink:0;width:auto}.card{max-width:760px;margin:20px auto;background:#fff;padding:25px;border-radius:25px}.hidden{display:none}.btn{background:#ff2f6d;color:#fff;border:none;padding:12px 18px;border-radius:12px}.row label{display:block;margin:10px 0}.wa,.cal{display:block;margin:10px 0;padding:14px;color:#fff;text-decoration:none;border-radius:12px}.wa{background:#25D366}.cal{background:#4285f4}</style></head><body><div class='card'><div id='s1'><h1>❤️ Nadine ❤️</h1><p>Hi Nadine 😊</p><p>Ich möchte dich etwas fragen ❤️</p><button class='btn' onclick='next(1,2)'>Weiter ❤️</button></div><div id='s2' class='hidden'><h2>Möchtest du mit mir unser nächstes Date planen? 🥺</h2><button class='btn' onclick='showAnalysis()'>Ja 😍</button></div><div id='ana' class='hidden'><pre id='txt'></pre><button id='anaBtn' class='btn hidden' onclick='startQuestions()'>Weiter ❤️</button></div><div id='qs' class='hidden'><div id='prog'></div><div id='q'></div></div><div id='plan' class='hidden'><h2>Date planen ❤️</h2><input id='date' type='date'><input id='time' type='time'><select id='act' onchange='toggleOther()'><option>🍦 Eis essen</option><option>🍿 Kino</option><option>🍝 Essen gehen</option><option>🌳 Spaziergang</option><option>🎯 Dart bei dir</option><option>🏊 Baden</option><option>🎉 Gemeinsam Feiern</option><option value='other'>✏️ Etwas anderes ...</option></select><input id='other' class='hidden' placeholder='Was hast du im Kopf? ❤️'><button class='btn' onclick='finish()'>Date bestätigen ❤️</button></div><div id='res' class='hidden'><div id='out'></div></div></div><script>function next(a,b){document.getElementById('s'+a).classList.add('hidden');document.getElementById('s'+b).classList.remove('hidden')}function showAnalysis(){s2.classList.add('hidden');ana.classList.remove('hidden');let t='Systemanalyse läuft...\n\n✅ Sehr sympathisch 😊\n\n✅ Hat ein wunderschönes Lächeln ❤️\n\n✅ Hat bereits Wanderungen und Spaziergänge erfolgreich überstanden 🥾🌳\n\n✅ Hat bei Eis, Billard und Kino einen ausgezeichneten Eindruck hinterlassen 🍦🎱🍿\n\nErgebnis:\n\nNächstes Date dringend empfohlen ❤️';let i=0,v=setInterval(()=>{txt.textContent=t.slice(0,++i);if(i>=t.length){clearInterval(v);anaBtn.classList.remove('hidden')}},15)}const qsData=[['🏆 Welches Date war bisher dein Favorit?',['Eis essen 🍦','Billard 🎱','Wandern 🥾','Spaziergang 🌳','Kino 🍿']],['⏰ Wie schnell vergeht die Zeit bei unseren Treffen für dich gefühlt?',['Normal 😊','Ziemlich schnell ❤️','Viel zu schnell 🥰','Wie spät plötzlich? 🙈']],['💭 Florian in einem Wort?','text'],['📋 Wie würdest du unsere bisherigen Treffen beschreiben?',['Freundschaftlich 😊','Sehr schöne Dates ❤️','Irgendwo dazwischen 🙈','Noch nicht sicher 😇']],['💌 Was schätzt du an Florian am meisten?','text'],['💌 Kleine Gegenanalyse',['Florian ist sehr sympathisch 😊','Ich freue mich immer auf unsere Treffen ❤️','Ich denke manchmal an unser nächstes Date 🥰','Florian verursacht gelegentlich Schmetterlinge im Bauch 🦋','Keine Angabe 😇']]];let qi=0,ans=[];function startQuestions(){ana.classList.add('hidden');qs.classList.remove('hidden');render()}function render(){prog.innerHTML='Frage '+(qi+1)+' von 6 ❤️';let d=qsData[qi];if(d[1]==='text'){q.innerHTML='<h3>'+d[0]+'</h3><textarea id=t></textarea><button class=btn onclick=nextQ()>Weiter</button>'}else{let h='<h3>'+d[0]+'</h3>';d[1].forEach(v=>h+='<div class=row><label><input type=radio name=r value="'+v+'"><span>'+v+'</span></label></div>');h+='<button class=btn onclick=nextQ()>Weiter</button>';q.innerHTML=h}}function nextQ(){let d=qsData[qi];if(d[1]==='text')ans.push(t.value||'-');else{let r=document.querySelector('input[name=r]:checked');if(!r)return;ans.push(r.value)}qi++;if(qi<6)render();else{qs.classList.add('hidden');plan.classList.remove('hidden')}}function toggleOther(){other.classList.toggle('hidden',act.value!=='other')}function finish(){let activity=act.value==='other'?other.value:act.value;let start=new Date(date.value+'T'+time.value);let end=new Date(start.getTime()+7200000);let fmt=d=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';let ics=`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:Date mit Florian ❤️\nDTSTART:${fmt(start)}\nDTEND:${fmt(end)}\nDESCRIPTION:${activity}\nEND:VEVENT\nEND:VCALENDAR`;let cal=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));let wa='https://api.whatsapp.com/send?phone=4915758309186&text='+encodeURIComponent('Hey Florian ❤️\n\nIch habe JA gesagt! 🥰\n\n📅 Unser Date: '+date.value+'\n⏰ '+time.value+'\n✨ '+activity+'\n\nUnd hier noch meine Antworten 😉❤️');plan.classList.add('hidden');res.classList.remove('hidden');out.innerHTML='<h2>✅ DATE BESTÄTIGT ❤️</h2><a class="cal" download="DateMitFlorian.ics" href="'+cal+'">📅 Kalender hinzufügen</a><div id=cert></div><div id=transfer></div>';let certTxt='🏆 OFFIZIELLES DATE-ZERTIFIKAT\n\nNadine ✅\nFlorian ✅\nDatum ✅\nUhrzeit ✅\nAktivität ✅\n\nNächstes Date bestätigt ❤️';let i=0;let c=setInterval(()=>{cert.textContent=certTxt.slice(0,++i);if(i>=certTxt.length){clearInterval(c);transfer.innerHTML='<br>📡 Datenübertragung ausstehend...<br>✅ Verbinde mit Florian...<br>✅ Überprüfe Schmetterlings-Analyse...<br>✅ Verpacke Antworten...<br>✅ Übertragung bereit ❤️<br><br><a class="wa" href="'+wa+'">📲 Antworten & Date an Florian senden</a>'}},10)}</script></body></html>
