<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nadine ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ff6b8a;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:500px;
    text-align:center;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.yes{
    background:#ff4d6d;
    color:white;
}

.hidden{
    display:none;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:10px;
    box-sizing:border-box;
}
</style>
</head>

<body>

<div class="card">

<div id="start">
<h1>❤️ Nadine ❤️</h1>
<p>Möchtest du mit mir auf ein Date gehen?</p>

<button class="yes" onclick="zeigeFormular()">
Ja 😍
</button>
</div>

<div id="formular" class="hidden">

<input type="date" id="datum">

<input type="time" id="uhrzeit">

<select id="aktivitaet" onchange="toggleCustomActivity()">
    <option value="Café ☕">Café ☕</option>
    <option value="Kino 🍿">Kino 🍿</option>
    <option value="Essen gehen 🍝">Essen gehen 🍝</option>
    <option value="Spaziergang 🌳">Spaziergang 🌳</option>
    <option value="Dart bei dir 🎯">Dart bei dir 🎯</option>
    <option value="Baden 🏊">Baden 🏊</option>
    <option value="Gemeinsam Feiern 🎉">Gemeinsam Feiern 🎉</option>
    <option value="custom">✏️ Etwas anderes ...</option>
</select>

<input
    type="text"
    id="customActivity"
    placeholder="Deine eigene Idee ❤️"
    class="hidden"
>

<br><br>

<button class="yes" onclick="bestaetigen()">
Bestätigen ❤️
</button>

</div>

<div id="ergebnis" class="hidden">
<h2>Perfekt ❤️</h2>
<p id="ausgabe"></p>
</div>

</div>


<script>

function zeigeFormular(){
    document.getElementById("start").classList.add("hidden");
    document.getElementById("formular").classList.remove("hidden");
}

function toggleCustomActivity(){

    const select =
        document.getElementById("aktivitaet");

    const input =
        document.getElementById("customActivity");

    if(select.value === "custom"){
        input.classList.remove("hidden");
    } else {
        input.classList.add("hidden");
    }
}

function bestaetigen(){

    const datum =
        document.getElementById("datum").value;

    const uhrzeit =
        document.getElementById("uhrzeit").value;

    let aktivitaet =
        document.getElementById("aktivitaet").value;

    if(aktivitaet === "custom"){

        aktivitaet =
            document.getElementById("customActivity")
            .value
            .trim();

        if(!aktivitaet){
            alert("Bitte eine eigene Idee eingeben ❤️");
            return;
        }
    }

    if(!datum || !uhrzeit){
        alert("Bitte Datum und Uhrzeit auswählen.");
        return;
    }

    const start =
        new Date(datum + "T" + uhrzeit);

    const ende =
        new Date(start.getTime() + 2 * 60 * 60 * 1000);

    const formatICS = (d) => {
        return d.toISOString()
            .replace(/[-:]/g,"")
            .split(".")[0] + "Z";
    };

    const ics =
`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:Date mit Florian ❤️
DESCRIPTION:${aktivitaet}
DTSTART:${formatICS(start)}
DTEND:${formatICS(ende)}
END:VEVENT
END:VCALENDAR`;

    const blob =
        new Blob([ics], {
            type: "text/calendar"
        });

    const kalenderUrl =
        URL.createObjectURL(blob);

    const nachricht =
`Hey Florian ❤️

Ich habe JA gesagt! 🥰

📅 ${datum}
⏰ ${uhrzeit}
✨ ${aktivitaet}

Ich freue mich schon ❤️`;

    const whatsappLink =
        "https://api.whatsapp.com/send?phone=4915758309186&text="
`` +
        encodeURIComponent(nachricht);

    document.getElementById("formular")
        .classList.add("hidden");

    document.getElementById("ergebnis")
        .classList.remove("hidden");

    document.getElementById("ausgabe").innerHTML =

    "📅 " + datum +
    "<br>" +
    "⏰ " + uhrzeit +
    "<br>" +
    "✨ " + aktivitaet +
    "<br><br>" +

    '<a href="' + kalenderUrl + '" download="DateMitFlorian.ics" style="display:inline-block;padding:12px 18px;background:#4285F4;color:white;text-decoration:none;border-radius:rder-radius:10px;font-weight:bold;">📲 Antwort per WhatsApp senden</a>';

</script>
</body>
</html>
