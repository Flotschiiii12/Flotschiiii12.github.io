<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nadine ❤️</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:linear-gradient(
        135deg,
        #ff5f8a,
        #ff7eb3,
        #ffc2d1
    );
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(15px);
    padding:35px;
    border-radius:30px;
    width:90%;
    max-width:550px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

button{
    padding:14px 24px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.yes{
    background:#ff4d6d;
    color:white;
}

.hidden{
    display:none;
}

input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    box-sizing:border-box;
    border-radius:10px;
    border:1px solid #ddd;
}

.button-link{
    display:block;
    width:100%;
    box-sizing:border-box;
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

.calendar{
    background:#4285F4;
}

.whatsapp{
    background:#25D366;
}

.cert{
    border-top:1px solid #ddd;
    margin-top:20px;
    padding-top:20px;
    color:#555;
}

</style>
</head>

<body>

<div class="card">

<div id="start">

<h1>❤️ Nadine ❤️</h1>

<p>Hi 😊</p>

<p>
Ich habe lange überlegt<br>
und möchte dich etwas fragen...
</p>

<br>

<button
class="yes"
onclick="zeigeFrage()">
Weiter ❤️
</button>

</div>

<div id="frage" class="hidden">

<h2>
Möchtest du mit mir auf ein Date gehen? 🥺
</h2>

<button
class="yes"
onclick="zeigeFormular()">
Ja 😍
</button>

<button
id="neinBtn"
onclick="neinKlick()">
Nein 🙈
</button>

</div>

<div id="formular" class="hidden">

<h2>🥰 Das macht mich glücklich</h2>

<input type="date" id="datum">

<input type="time" id="uhrzeit">

<select id="aktivitaet" onchange="toggleCustomActivity()">
<option value="Café ☕">Café ☕</option>
