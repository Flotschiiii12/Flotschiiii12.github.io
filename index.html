<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nadine ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ff6b8a;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:500px;
    text-align:center;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.yes{
    background:#ff4d6d;
    color:white;
}

.hidden{
    display:none;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:10px;
    box-sizing:border-box;
}
</style>
</head>

<body>

<div class="card">

<div id="start">
<h1>❤️ Nadine ❤️</h1>
<p>Möchtest du mit mir auf ein Date gehen?</p>

<button class="yes" onclick="zeigeFormular()">
Ja 😍
</button>
</div>

<div id="formular" class="hidden">

<input type="date" id="datum">

<input type="time" id="uhrzeit">

<select id="aktivitaet" onchange="toggleCustomActivity()">
    <option>Café ☕</option>
    <option>Kino 🍿</option>
    <option>Essen gehen 🍝</option>
    <option>Spaziergang 🌳</option>
    <option>Dart bei dir 🎯</option>
    <option>Baden 🏊</option>
    <option>Gemeinsam Feiern 🎉</option>
    <option value="custom">Etwas anderes ... ✏️</option>
</select>

<input
    type="text"
    id="customActivity"
    placeholder="Deine Idee ❤️"
    style="display:none;"
>


<br><br>

<button class="yes" onclick="bestaetigen()">
Bestätigen ❤️
</button>

</div>

<div id="ergebnis" class="hidden">
<h2>Perfekt ❤️</h2>
<p id="ausgabe"></p>
</div>

</div>

<script>

function zeigeFormular(){
    document.getElementById("start").classList.add("hidden");
    document.getElementById("formular").classList.remove("hidden");
}

function bestaetigen(){

    const datum =
        document.getElementById("datum").value;

    const uhrzeit =
        document.getElementById("uhrzeit").value;

    const aktivitaet =
        document.getElementById("aktivitaet").value;

    if(!datum || !uhrzeit){
        alert("Bitte Datum und Uhrzeit auswählen.");
        return;
    }

    document.getElementById("formular")
        .classList.add("hidden");

    document.getElementById("ergebnis")
        .classList.remove("hidden");

    document.getElementById("ausgabe").innerHTML =
        "📅 " + datum + "<br>" +
        "⏰ " + uhrzeit + "<br>" +
        "✨ " + aktivitaet;
}
</script>
<script>

function zeigeFormular(){
    document.getElementById("start").classList.add("hidden");
    document.getElementById("formular").classList.remove("hidden");
}

function bestaetigen(){

    const datum = document.getElementById("datum").value;
    const uhrzeit = document.getElementById("uhrzeit").value;
    const aktivitaet = document.getElementById("aktivitaet").value;

    if(!datum || !uhrzeit){
        alert("Bitte Datum und Uhrzeit auswählen.");
        return;
    }

    const start = new Date(datum + "T" + uhrzeit);
    const ende = new Date(start.getTime() + 2 * 60 * 60 * 1000);

    const formatICS = (d) => {
        return d.toISOString()
            .replace(/[-:]/g,"")
            .split(".")[0] + "Z";
    };

    const ics =
`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:Date mit Florian ❤️
DESCRIPTION:${aktivitaet}
DTSTART:${formatICS(start)}
DTEND:${formatICS(ende)}
END:VEVENT
END:VCALENDAR`;

    const blob = new Blob([ics], {
        type: "text/calendar"
    });

    const kalenderUrl =
        URL.createObjectURL(blob);

    const nachricht =
`Hey Florian ❤️

Ich habe JA gesagt! 🥰

📅 ${datum}
⏰ ${uhrzeit}
✨ ${aktivitaet}

Ich freue mich schon ❤️`;

    const whatsappLink =
        "https://api.whatsapp.com/send?phone=4915758309186&text=" +
        encodeURIComponent(nachricht);

    document.getElementById("formular")
        .classList.add("hidden");

    document.getElementById("ergebnis")
        .classList.remove("hidden");

    document.getElementById("ausgabe").innerHTML =
        "📅 " + datum + "<br>" +
        "⏰ " + uhrzeit + "<br>" +
        "✨ " + aktivitaet +
        "<br><br>" +

        '<a href="' + kalenderUrl + '" download="DateMitFlorian.ics" ' +
        'style="display:inline-block;background:#4285F4;color:white;padding:12px 18px;border-radius:10px;text-decoration:none;font-weight:bold;margin-bottom:10px;">' +
        '📅 Kalender hinzufügen' +
        '</a>' +

        '<br><br>' +

        '<a href="' + whatsappLink + '" ' +
        'style="display:inline-block;background:#25D366;color:white;padding:12px 18px;border-radius:10px;text-decoration:none;font-weight:bold;">' +
        '📲 Antwort per WhatsApp senden' +
        '</a>';
}

</script>
</script>
</body>
</html>
