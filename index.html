<!DOCTYPE html><html lang='de'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Nadine V7 Premium вқӨпёҸ</title><style>body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#ff5f8a,#ff7eb3,#ffc2d1);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;overflow:hidden}.card{max-width:760px;width:100%;background:rgba(255,255,255,.95);border-radius:28px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.2)}.hidden{display:none}.btn{background:#ff2f6d;color:#fff;border:none;padding:14px 20px;border-radius:14px;cursor:pointer}.btn2{background:#eee;color:#333}.heartTitle{animation:beat 1.8s infinite;color:#ff2f6d}.heart{position:fixed;opacity:.2;animation:float 10s linear infinite}@keyframes float{from{transform:translateY(100vh)}to{transform:translateY(-120px)}}@keyframes beat{50%{transform:scale(1.06)}}input,select,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:10px}.bar{height:12px;background:#eee;border-radius:10px}.fill{height:12px;background:#ff2f6d;border-radius:10px}.wa{display:block;background:#25D366;color:#fff;text-decoration:none;padding:14px;border-radius:12px;margin-top:10px;text-align:center}</style></head><body><div class='card'><div id='a'><h1 class='heartTitle'>вқӨпёҸ Nadine вқӨпёҸ</h1><p id='status'></p><p>Hi Nadine рҹҳҠ<br>Ich mГ¶chte dich etwas fragen вқӨпёҸ</p><button class='btn' onclick='b()'>Weiter вқӨпёҸ</button></div><div id='b' class='hidden'><h2>MГ¶chtest du mit mir unser nГӨchstes Date planen? рҹҘә</h2><button class='btn' onclick='analyse()'>Ja рҹҳҚ</button><button id='n' class='btn2' onclick='nope()'>Nein рҹҷҲ</button></div><div id='c' class='hidden'><pre id='ana' style='white-space:pre-wrap'></pre></div><div id='d' class='hidden'><div id='prog'></div><div class='bar'><div id='fill' class='fill'></div></div><div id='q'></div></div><div id='e' class='hidden'><h2>Date planen вқӨпёҸ</h2><input id='date' type='date'><input id='time' type='time'><select id='act'><option>рҹҚҰ Eis essen</option><option>рҹҚҝ Kino</option><option>рҹҚқ Essen gehen</option><option>рҹҢі Spaziergang</option><option>рҹҺҜ Dart bei dir</option><option>рҹҸҠ Baden</option><option>рҹҺү Gemeinsam Feiern</option></select><button class='btn' onclick='finish()'>Date bestГӨtigen вқӨпёҸ</button></div><div id='f' class='hidden'><div id='out'></div></div></div><script>['Systemstatus: Vorfreude auf Nadine sehr hoch вқӨпёҸ','Warnung: Florian freut sich bereits etwas zu sehr рҹҳҮ','Analyse: Nadine hat bisher einen ausgezeichneten Eindruck hinterlassen вқӨпёҸ'][Math.floor(Math.random()*3)]&&(status.textContent=['Systemstatus: Vorfreude auf Nadine sehr hoch вқӨпёҸ','Warnung: Florian freut sich bereits etwas zu sehr рҹҳҮ','Analyse: Nadine hat bisher einen ausgezeichneten Eindruck hinterlassen вқӨпёҸ'][Math.floor(Math.random()*3)]);for(let i=0;i<20;i++){let h=document.createElement('div');h.className='heart';h.innerHTML='вқӨпёҸ';h.style.left=Math.random()*100+'%';document.body.appendChild(h)}function b(){a.classList.add('hidden');bdiv=document.getElementById('b');bdiv.classList.remove('hidden')}let nt=['Nein рҹҷҲ','Sicher? рҹҘә','Wirklich? рҹҳў','Ganz sicher? рҹҳӯ','Die Statistik empfiehlt Ja рҹ“Ҡ','Florian wГӨre traurig рҹ’”','Vielleicht doch Ja? рҹҳҮ'],ni=0;function nope(){ni++;if(ni<nt.length)n.innerText=nt[ni];else n.style.display='none'}function analyse(){bdiv.classList.add('hidden');c.classList.remove('hidden');let t='Systemanalyse lГӨuft...\n\nвң… Sehr sympathisch рҹҳҠ\n\nвң… Hat ein wunderschГ¶nes LГӨcheln вқӨпёҸ\n\nвң… Hat bereits Wanderungen und SpaziergГӨnge erfolgreich Гјberstanden рҹҘҫрҹҢі\n\nвң… Hat bei Eis, Billard und Kino einen ausgezeichneten Eindruck hinterlassen рҹҚҰрҹҺұрҹҚҝ\n\nрҹ“Ҡ Erfolgsquote bisheriger Dates\nрҹҚҰвң… рҹҺұвң… рҹҘҫвң… рҹҢівң… рҹҚҝвң…\n\nGesamtergebnis: 5 von 5 erfolgreich вқӨпёҸ';let i=0;let s=setInterval(()=>{ana.textContent=t.slice(0,++i)+'в–Ҳ';if(i>=t.length){clearInterval(s);setTimeout(startQ,1500)}},15)}const qs=[['Lieblingsdate?',['Eis рҹҚҰ','Billard рҹҺұ','Wandern рҹҘҫ','Spaziergang рҹҢі','Kino рҹҚҝ']],['Zeit bei Treffen?',['Normal','Schnell вқӨпёҸ','Viel zu schnell рҹҘ°','Wie spГӨt plГ¶tzlich? рҹҷҲ']],['Florian in einem Wort?','t'],['Treffen beschreiben?',['Freundschaftlich рҹҳҠ','Sehr schГ¶ne Dates вқӨпёҸ','Irgendwo dazwischen рҹҷҲ','Noch nicht sicher рҹҳҮ']],['Was schГӨtzt du an Florian am meisten?','t'],['Gegenanalyse',['Florian ist sehr sympathisch рҹҳҠ','Ich freue mich immer auf unsere Treffen вқӨпёҸ','Ich denke manchmal an unser nГӨchstes Date рҹҘ°','Florian verursacht gelegentlich Schmetterlinge im Bauch рҹҰӢ','Keine Angabe рҹҳҮ']]];let qi=0,ans=[];function startQ(){c.classList.add('hidden');d.classList.remove('hidden');render()}function render(){prog.innerHTML='Frage '+(qi+1)+' von 6 вқӨпёҸ';fill.style.width=((qi)/6*100)+'%';let x=qs[qi];if(x[1]=='t'){q.innerHTML='<h3>'+x[0]+'</h3><textarea id=t></textarea><button class=btn onclick=next()>Weiter</button>'}else{let h='<h3>'+x[0]+'</h3>';x[1].forEach(v=>h+='<label><input type=radio name=r value="'+v+'"> '+v+'</label><br>');h+='<button class=btn onclick=next()>Weiter</button>';q.innerHTML=h}}function next(){let x=qs[qi];if(x[1]=='t')ans.push(document.getElementById('t').value||'-');else{let r=document.querySelector('input[name=r]:checked');if(!r)return;ans.push(r.value)}qi++;if(qi<6)render();else{d.classList.add('hidden');e.classList.remove('hidden')}}function finish(){let target=new Date(date.value+'T'+time.value);let days=Math.max(0,Math.floor((target-new Date())/86400000));let msg='Hey Florian вқӨпёҸ\n\nIch habe JA gesagt! рҹҘ°\n\nрҹ“… Unser Date: '+date.value+'\nвҸ° '+time.value+'\nвңЁ '+act.value+'\n\nUnd hier noch meine Antworten рҹҳүвқӨпёҸ\n\nрҹҸҶ '+ans[0]+'\nвҸ° '+ans[1]+'\nрҹ’ӯ '+ans[2]+'\nрҹ“Ӣ '+ans[3]+'\nрҹ’Ң '+ans[4]+'\nрҹҰӢ '+ans[5];let wa='https://api.whatsapp.com/send?phone=4915758309186&text='+encodeURIComponent(msg);e.classList.add('hidden');f.classList.remove('hidden');out.innerHTML='вқӨпёҸ<br><br>Du hast gerade offiziell ein weiteres Date mit Florian geplant рҹҳҠ<br><br><h2>вң… DATE BESTГ„TIGT вқӨпёҸ</h2><p>вҸі Noch '+days+' Tage bis zum Date</p><p>рҹ’Ң Kleine Nachricht<br><br>Ich freue mich wirklich immer, wenn wir Zeit miteinander verbringen рҹҳҠвқӨпёҸ<br><br>Du hast es geschafft, dass ich diese komplette Webseite fГјr genau eine Person gebaut habe вқӨпёҸрҹҳҮ</p><h3>рҹҸҶ OFFIZIELLES DATE-ZERTIFIKAT</h3><p>Nadine вң…<br>Florian вң…<br>Datum вң…<br>Uhrzeit вң…<br>AktivitГӨt вң…<br><br>NГӨchstes Date bestГӨtigt вқӨпёҸ</p><div id=tr></div>';let steps=['рҹ“Ў DatenГјbertragung ausstehend...','Verbinde mit Florian... вң…','ГңberprГјfe Schmetterlings-Analyse... вң…','Verpacke Antworten... вң…','Гңbertragung bereit вқӨпёҸ'];let i=0;let t=setInterval(()=>{tr.innerHTML+=(steps[i]||'')+'<br>';i++;if(i>steps.length){clearInterval(t);tr.innerHTML+='<br><b>Die Ergebnisse wurden vorbereitet, aber noch nicht an Florian gesendet. Bitte jetzt Гјbertragen вқӨпёҸ</b><a class=wa href="'+wa+'">рҹ“І Antworten & Date an Florian senden</a>'}},900)}</script></body></html>
