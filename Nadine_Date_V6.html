<!DOCTYPE html><html lang='de'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Für Nadine ❤️</title><style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#ff5f8a,#ff7eb3,#ffc2d1);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;overflow:hidden}.card{max-width:700px;width:100%;background:rgba(255,255,255,.94);border-radius:28px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.2);position:relative;z-index:2}.hidden{display:none}h1{color:#ff2f6d;animation:heartbeat 1.8s infinite}.btn{background:#ff2f6d;color:#fff;border:none;padding:14px 22px;border-radius:14px;cursor:pointer}.btn2{background:#eee;color:#333}input,select,textarea{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ddd}.heart{position:fixed;opacity:.18;animation:f 10s linear infinite}@keyframes f{from{transform:translateY(100vh)}to{transform:translateY(-120px)}}@keyframes heartbeat{50%{transform:scale(1.06)}}.fade{animation:fade .5s}@keyframes fade{from{opacity:0}to{opacity:1}}.stamp{font-size:34px;color:red;font-weight:bold;transform:rotate(-12deg)}.link{display:block;text-decoration:none;color:#fff;padding:14px;border-radius:12px;margin:10px 0}.wa{background:#25D366}.cal{background:#4285f4}
</style></head><body><div class='card'>
<div id='s1'><h1>❤️ Nadine ❤️</h1><p>Hi 😊</p><p>Ich habe lange überlegt...<br>und möchte dich etwas fragen ❤️</p><button class='btn' onclick='showQ()'>Weiter ❤️</button></div>
<div id='s2' class='hidden'><h2>Möchtest du mit mir<br>unser nächstes Date planen? 🥺</h2><button class='btn' onclick='startAnalysis()'>Ja 😍</button><button id='noBtn' class='btn btn2' onclick='noClick()'>Nein 🙈</button></div>
<div id='analysis' class='hidden'><h2>🖥️ Systemanalyse</h2><pre id='analysisText' style='white-space:pre-wrap;text-align:left'></pre></div>
<div id='questions' class='hidden'><h3 id='progress'></h3><div id='qbox'></div></div>
<div id='plan' class='hidden'><h2>Date planen ❤️</h2><input id='date' type='date'><input id='time' type='time'><select id='activity'><option>🍦 Eis essen</option><option>🍿 Kino</option><option>🍝 Essen gehen</option><option>🌳 Spaziergang</option><option>🎯 Dart bei dir</option><option>🏊 Baden</option><option>🎉 Gemeinsam Feiern</option><option>✏️ Eigene Idee</option></select><button class='btn' onclick='finish()'>Date bestätigen ❤️</button></div>
<div id='result' class='hidden'><h2>✅ DATE BESTÄTIGT ❤️</h2><div id='out'></div></div></div>
<script>
for(let i=0;i<20;i++){let h=document.createElement('div');h.className='heart';h.innerHTML='❤️';h.style.left=Math.random()*100+'%';h.style.fontSize=(16+Math.random()*20)+'px';h.style.animationDuration=(5+Math.random()*8)+'s';document.body.appendChild(h)}
const noTexts=['Nein 🙈','Sicher? 🥺','Wirklich? 😢','Ganz sicher? 😭','Die Statistik empfiehlt Ja 📊','Florian wäre traurig 💔','Vielleicht doch Ja? 😇'];let ni=0;
function showQ(){s1.classList.add('hidden');s2.classList.remove('hidden')}
function noClick(){ni++; if(ni<noTexts.length) noBtn.innerText=noTexts[ni]; else noBtn.style.display='none';}
function startAnalysis(){s2.classList.add('hidden');analysis.classList.remove('hidden');let txt='Systemanalyse läuft...\n\n✅ Sehr sympathisch 😊\n\n✅ Hat ein wunderschönes Lächeln ❤️\n\n✅ Hat bereits Wanderungen und Spaziergänge erfolgreich überstanden 🥾🌳\n\n✅ Hat bei Eis, Billard und Kino einen ausgezeichneten Eindruck hinterlassen 🍦🎱🍿\n\nErgebnis:\n\nNächstes Date dringend empfohlen ❤️';let i=0;let el=document.getElementById('analysisText');let iv=setInterval(()=>{el.textContent=txt.slice(0,++i)+'█';if(i>=txt.length){clearInterval(iv);el.textContent=txt;setTimeout(startQuestions,1500)}},20)}
const questions=[['🏆 Welches Date war bisher dein Favorit?',['Eis essen 🍦','Billard 🎱','Wandern 🥾','Spaziergang 🌳','Kino 🍿','Keines davon 😇']],['⏰ Was trifft auf unsere bisherigen Treffen zu?',['Normal 😊','Ziemlich schnell ❤️','Viel zu schnell 🥰','Wie spät plötzlich? 🙈']],['💭 Florian in einem Wort?','text'],['📋 Wie würdest du unsere bisherigen Treffen beschreiben?',['Freundschaftlich 😊','Sehr schöne Dates ❤️','Irgendwo dazwischen 🙈','Noch nicht sicher 😇']],['💌 Was schätzt du an Florian am meisten?','text'],['🦋 Gegenanalyse',['Florian ist sehr sympathisch 😊','Ich freue mich immer auf unsere Treffen ❤️','Ich denke manchmal an unser nächstes Date 🥰','Florian verursacht gelegentlich Schmetterlinge im Bauch 🦋','Keine Angabe 😇']]];
let qi=0,ans=[];
function startQuestions(){analysis.classList.add('hidden');questionsDiv=document.getElementById('questions');questionsDiv.classList.remove('hidden');renderQ();}
function renderQ(){progress.innerText='Frage '+(qi+1)+' von 6 ❤️';let q=questions[qi];if(q[1]==='text'){qbox.innerHTML='<h3>'+q[0]+'</h3><textarea id="a"></textarea><button class="btn" onclick="nextQ()">Weiter</button>';}else{let h='<h3>'+q[0]+'</h3>';q[1].forEach(v=>h+='<div><label><input type="radio" name="r" value="'+v+'"> '+v+'</label></div>');h+='<button class="btn" onclick="nextQ()">Weiter</button>';qbox.innerHTML=h;}}
function nextQ(){let q=questions[qi];if(q[1]==='text'){ans.push(a.value||'-');}else{let r=document.querySelector('input[name=r]:checked');if(!r)return;ans.push(r.value);if(qi===5&&r.value.includes('Schmetterlinge')) alert('🦋');}qi++; if(qi<questions.length) renderQ(); else{questions.classList.add('hidden');plan.classList.remove('hidden');}}
function finish(){if(!date.value||!time.value)return alert('Datum/Uhrzeit wählen');let act=activity.value;let msg=`Hey Florian ❤️\n\nIch habe JA gesagt! 🥰\n\n📅 Unser Date:\nDatum: ${date.value}\n\n⏰ Uhrzeit:\n${time.value}\n\n✨ Aktivität:\n${act}\n\nUnd hier noch meine Antworten 😉❤️\n\n🏆 Lieblingsdate:\n${ans[0]}\n\n⏰ Zeit bei unseren Treffen:\n${ans[1]}\n\n💭 Florian in einem Wort:\n${ans[2]}\n\n📋 Unsere bisherigen Treffen:\n${ans[3]}\n\n💌 Was ich an Florian am meisten schätze:\n${ans[4]}\n\n🦋 Gegenanalyse:\n${ans[5]}`; let wa='https://api.whatsapp.com/send?phone=4915758309186&text='+encodeURIComponent(msg); plan.classList.add('hidden'); result.classList.remove('hidden'); out.innerHTML=`<p>💌 Ich freue mich wirklich immer, wenn wir Zeit miteinander verbringen 😊❤️</p><div class='stamp'>GENEHMIGT ✅</div><div style='margin-top:18px'>📡 Datenübertragung ausstehend...</div><div id='transfer'></div>`; let steps=['Verbinde mit Florian... ✅','Überprüfe Schmetterlings-Analyse... ✅','Verpacke Antworten... ✅','Übertragung bereit ❤️']; let i=0; let t=setInterval(()=>{transfer.innerHTML+=(steps[i]||'')+'<br>'; i++; if(i>steps.length){clearInterval(t); transfer.innerHTML+=`<br><b>Die Ergebnisse wurden vorbereitet, aber noch nicht an Florian gesendet. Bitte jetzt übertragen ❤️</b><a class='link wa' href='${wa}'>📲 Ergebnisse an Florian übertragen</a>`;}},900);}
</script></body></html>
